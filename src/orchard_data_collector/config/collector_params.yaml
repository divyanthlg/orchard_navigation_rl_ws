# ── BC Data Collector Config (Warthog w200_0100) ────────────────────────────
data_collector:
  ros__parameters:
    # Topics
    image_topic: "/w200_0100/sensors/camera_0/color/image"
    cmd_vel_topic: "/w200_0100/rc_teleop/cmd_vel"

    # Storage paths
    image_dir: "/home/divyanthlg/projects/orchard_navigation/vae_stabilityai/data/raw/images"
    labels_file: "/home/divyanthlg/projects/orchard_navigation/vae_stabilityai/data/raw/labels.csv"

    # Collection settings
    save_rate_hz: 5.0          # Frames/sec to save (5-10 typical for BC)
    image_width: 256           # Resize on save
    image_height: 256
    sync_tolerance_sec: 0.1    # Max time gap between image and cmd_vel

    # Filtering
    min_linear_vel: 0.01       # Skip frames when robot is stopped
    skip_stationary: true
