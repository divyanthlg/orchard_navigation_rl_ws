# ══════════════════════════════════════════════════════════════════════════════
# Orchard Nav Deploy + DAgger Config
# ══════════════════════════════════════════════════════════════════════════════

# ── Policy Node ──────────────────────────────────────────────────────────────
policy_node:
  ros__parameters:
    # Topics
    image_topic: "/camera/color/image_raw"

    # Model
    # Path to the orchard_nav Python project (with models/ folder)
    model_project_path: "/home/divyanthlg/projects/orchard_navigation/vae_stabilityai"
    checkpoint_path: "/home/divyanthlg/projects/orchard_navigation/vae_stabilityai/checkpoints/best.pt"
    vae_model_id: "stabilityai/sd-vae-ft-mse"
    latent_dim: 128
    action_dim: 2
    extra_dim: 0
    hidden_dim: 256
    image_size: 256

    # Velocity scaling (Tanh [-1,1] → real units)
    max_linear_vel: 1.0     # m/s
    max_angular_vel: 0.5    # rad/s

    # Inference rate
    inference_rate_hz: 10.0

# ── Cmd Vel Mux ─────────────────────────────────────────────────────────────
cmd_vel_mux:
  ros__parameters:
    # Input topics
    policy_cmd_topic: "/policy/cmd_vel"
    human_cmd_topic: "/joy_teleop/cmd_vel"    # From joystick teleop

    # Output topic (goes to the Warthog)
    output_cmd_topic: "/cmd_vel"

    # Human override timeout: if no human input for this long, revert to policy
    human_timeout_sec: 0.5

    # Deadzone: joystick inputs below this are considered "not active"
    joy_linear_deadzone: 0.05
    joy_angular_deadzone: 0.05

# ── DAgger Supervisor ────────────────────────────────────────────────────────
dagger_supervisor:
  ros__parameters:
    image_topic: "/camera/color/image_raw"
    active_cmd_topic: "/cmd_vel"               # What actually goes to the robot
    human_cmd_topic: "/joy_teleop/cmd_vel"

    # DAgger data storage (separate from original BC data)
    dagger_iteration: 1                         # Increment this for each DAgger round
    base_data_dir: "/home/divyanthlg/projects/orchard_navigation/vae_stabilityai/data"

    # Collection settings
    save_rate_hz: 5.0
    image_width: 256
    image_height: 256
    sync_tolerance_sec: 0.1

    # What to log:
    # "corrections_only" — only save frames when human is actively correcting
    # "all"             — save all frames (human corrections + policy running)
    log_mode: "corrections_only"
